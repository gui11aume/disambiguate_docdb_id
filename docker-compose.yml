services:
  api:
    build: .
    restart: unless-stopped
    environment:
      DOCDB_LMDB_PATH: /data/docdb.lmdb
    volumes:
      - lmdb_data:/data:ro
    expose:
      - "8000"

  mcp:
    build: .
    restart: unless-stopped
    environment:
      DOCDB_API_URL: http://api:8000
    expose:
      - "8001"
    command: ["uv", "run", "docdb-mcp-http"]

  web:
    build: .
    restart: unless-stopped
    environment:
      DOCDB_MCP_URL: https://docdb.sarl-graip.fr/mcp
      SCALEWAY_API_KEY: ${SCALEWAY_API_KEY}
      SCALEWAY_BASE_URL: ${SCALEWAY_BASE_URL}
      SCALEWAY_MODEL: qwen3.6-35b-a3b
      SCALEWAY_TEM_API_KEY: ${SCALEWAY_TEM_API_KEY}
      SCALEWAY_TEM_PROJECT_ID: ${SCALEWAY_TEM_PROJECT_ID}
      WEB_DB_PATH: /data/web.sqlite3
      WEB_DAILY_QUOTA: "20"
      WEB_MAGIC_LINK_TTL_MINUTES: "15"
      WEB_SESSION_TTL_DAYS: "30"
      WEB_MAX_INPUT_CHARS: "4000"
    volumes:
      - web_data:/data
    expose:
      - "8002"
    command: ["uv", "run", "docdb-web"]

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - api
      - mcp
      - web

volumes:
  lmdb_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /srv/docdb
  web_data:
