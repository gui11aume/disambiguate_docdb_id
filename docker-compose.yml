services:
  api:
    build: .
    restart: unless-stopped
    environment:
      DOCDB_LMDB_PATH: /data/docdb.lmdb
    volumes:
      - lmdb_data:/data:ro
    expose:
      - "8000"

  mcp:
    build: .
    restart: unless-stopped
    environment:
      DOCDB_API_URL: http://api:8000
    expose:
      - "8001"
    command: ["uv", "run", "docdb-mcp-http"]

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - api
      - mcp

volumes:
  lmdb_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /srv/docdb
