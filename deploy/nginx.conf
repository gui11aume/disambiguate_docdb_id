limit_req_zone $http_cf_connecting_ip zone=api:10m rate=20r/s;

server {
    listen 80;
    server_name _;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name _;

    ssl_certificate /etc/letsencrypt/live/docdb.sarl-graip.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/docdb.sarl-graip.fr/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    location /mcp {
        proxy_pass http://mcp:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $http_cf_connecting_ip;
        proxy_read_timeout 60s;
        proxy_buffering off;
    }

    location / {
        limit_req zone=api burst=50 nodelay;
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $http_cf_connecting_ip;
        proxy_read_timeout 60s;
    }
}
